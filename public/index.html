<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Health Dashboard</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#e07a4f">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6f0e8; --surface:#fffdf9; --border:#ece2d5; --track:#f0e7da;
    --ink:#2b2620; --ink2:#332c26;
    --muted:#4a4139; --muted2:#6f655b; --muted3:#8a7d6d;
    --faint:#9a8d7d; --faintest:#c3b5a3; --eyebrow:#b08968;
    --green:#5a8a5f; --red:#c05a4a;
    --accent:#e07a4f;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:'Nunito',system-ui,sans-serif;color:var(--ink2);-webkit-font-smoothing:antialiased}
  .page{max-width:1180px;margin:0 auto;padding:40px 40px 72px}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .fade-up{animation:fadeUp .6s ease-out both}

  /* ---------- Header ---------- */
  .header{display:flex;justify-content:space-between;align-items:flex-start;gap:32px;flex-wrap:wrap;margin-bottom:36px}
  .greeting{padding-top:8px}
  .eyebrow{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--eyebrow);margin-bottom:10px}
  h1{margin:0;font-family:'Fraunces',serif;font-weight:600;font-size:44px;line-height:1.05;letter-spacing:-.01em;color:var(--ink)}
  .sub{margin:12px 0 0;font-size:17px;line-height:1.5;color:var(--muted2);max-width:420px}
  .chips{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
  .chip{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:7px 13px 7px 10px}
  .chip .dot{width:8px;height:8px;border-radius:50%}
  .chip span:last-child{font-size:12.5px;font-weight:700;color:var(--muted2)}

  .score-card{display:flex;align-items:center;gap:24px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:26px 30px;box-shadow:0 8px 30px -18px rgba(120,80,40,.35)}
  .ring-wrap{position:relative;width:148px;height:148px;flex:none}
  .ring-wrap.small{width:118px;height:118px}
  .ring-block{flex:none}
  .ring-under{text-align:center;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--eyebrow);margin-top:8px}
  .ring-num.small{font-size:30px}
  .score-row{display:flex;align-items:baseline;gap:8px;margin-top:8px}
  .score-tag{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);width:58px;flex:none}
  .status-word.sm{font-size:19px}
  .ring-wrap svg{transform:rotate(-90deg)}
  .ring-wrap .progress{transition:stroke-dashoffset .6s ease-out}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-num{font-family:'Fraunces',serif;font-weight:600;font-size:42px;line-height:1;color:var(--ink)}
  .ring-label{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--eyebrow);margin-top:3px}
  .score-text{max-width:170px}
  .score-text .eyebrow{font-size:12px;font-weight:800;margin-bottom:6px}
  .status-word{font-family:'Fraunces',serif;font-weight:600;font-size:26px;line-height:1.1;color:var(--ink)}
  .delta{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:13.5px;font-weight:700}
  .delta.up{color:var(--green)} .delta.down{color:var(--red)}
  .delta .arrow{font-size:15px}

  /* ---------- Metric cards ---------- */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:22px;box-shadow:0 8px 26px -20px rgba(120,80,40,.4)}
  .metric-card{padding:22px 22px 18px;display:flex;flex-direction:column;min-height:250px}
  .metric-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
  .metric-id{display:flex;align-items:center;gap:9px}
  .icon-tile{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .metric-label{font-size:13.5px;font-weight:800;color:var(--muted)}
  .score-pill{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:800}
  .hero{display:flex;align-items:baseline;gap:5px;margin-bottom:4px}
  .hero .value{font-family:'Fraunces',serif;font-weight:600;font-size:34px;line-height:1;color:var(--ink)}
  .hero .unit{font-size:14px;font-weight:700;color:var(--faint)}
  .metric-sub{font-size:13px;font-weight:600;color:var(--muted3);line-height:1.4;margin-bottom:auto}
  .metric-sub.stale{color:var(--faint)}
  .bars{display:flex;align-items:flex-end;gap:5px;height:52px;margin-top:18px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bar{width:100%;border-radius:5px;transition:height .6s ease-out}
  .bar-day{font-size:9px;font-weight:800;color:var(--faintest)}

  /* ---------- Weekly trends ---------- */
  .trends{display:grid;grid-template-columns:1.9fr 1fr;gap:20px;margin-top:20px}
  .trend-card{padding:24px 26px 18px}
  .trend-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .card-title{font-size:13.5px;font-weight:800;color:var(--muted)}
  .card-caption{font-size:12.5px;font-weight:700;color:var(--faint)}
  .trend-card svg{display:block;overflow:visible;width:100%}
  .contrib-card{padding:24px 26px;display:flex;flex-direction:column}
  .contrib-card .card-title{margin-bottom:4px}
  .contrib-card .card-caption{margin-bottom:20px}
  .contrib-rows{display:flex;flex-direction:column;gap:18px;margin-top:2px}
  .contrib-line{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .contrib-line .label{font-size:13.5px;font-weight:800;color:var(--muted)}
  .contrib-line .num{font-size:14px;font-weight:800}
  .rail{height:9px;border-radius:999px;background:var(--track);overflow:hidden}
  .rail.thin{height:6px}
  .rail.second{margin-top:4px}
  .rail .fill{height:100%;border-radius:999px;transition:width .6s ease-out}

  /* ---------- Manual run log ---------- */
  .log-run{margin-top:10px;text-align:center}
  .log-run-btn{display:inline-block;background:none;border:0;padding:0;font:inherit;font-size:10.5px;font-weight:800;color:var(--faint);cursor:pointer;letter-spacing:.04em;text-transform:uppercase}
  .log-run-btn:hover{color:var(--eyebrow)}
  .log-run-form{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center}
  .log-run-form input{width:64px;border:1px solid var(--border);border-radius:8px;padding:5px 7px;font:inherit;font-size:12px;color:var(--ink2);background:var(--surface)}
  .log-run-form input.lr-date{width:118px}
  .log-run-form button{border:0;border-radius:8px;padding:5px 10px;font:inherit;font-size:12px;font-weight:800;background:var(--accent);color:#fff;cursor:pointer}

  /* ---------- Garmin CSV import ---------- */
  .import-link{display:block;text-align:center;margin-top:8px;font-size:10.5px;font-weight:800;color:var(--faint);cursor:pointer;letter-spacing:.04em;text-transform:uppercase}
  .import-link:hover{color:var(--eyebrow)}
  .import-link.error{color:var(--red)}
  .metric-card.drop-target{border-color:var(--accent);box-shadow:0 8px 26px -16px rgba(224,122,79,.55)}

  /* ---------- Skeleton loading ---------- */
  .skeleton .sk{background:var(--track);border-radius:8px;animation:pulse 1.2s ease-in-out infinite alternate}
  @keyframes pulse{from{opacity:.55}to{opacity:1}}

  /* ---------- Responsive ---------- */
  @media (max-width:900px){
    .metrics{grid-template-columns:repeat(2,1fr)}
    .trends{grid-template-columns:1fr}
    .header{flex-direction:column}
  }
  @media (max-width:520px){
    .page{padding:24px 20px 56px}
    .metrics{grid-template-columns:1fr}
    h1{font-size:36px}
  }
</style>
</head>
<body>
<div class="page" id="app"></div>

<script src="data/garmin-data.js"></script>
<script src="data/withings-data.js"></script>
<script src="data/calories-data.js"></script>
<script>
/* =========================================================================
 * DATA LAYER
 * Replace fetchDashboardData() with real calls to Garmin / Withings / your
 * calorie PWA. Each source resolves to the shape shown below, or `null`
 * when it fails / hasn't synced — the UI then shows "Not synced" for that
 * card and drops it from the Vitality average.
 * ========================================================================= */

const CONFIG = {
  userName: 'Michael',
  accent: '#e07a4f',        // alternates: #c9736a, #5fa06a, #7b74c9
  encouragement: true,
  dailyGoalKm: 2.5,         // running sub-score = today's km vs this goal
};

const SOURCE_META = {
  run:    { label: 'Running',  chip: 'Garmin',         icon: '🏃', color: '#e0894f', tint: '#fbeee2' },
  sleep:  { label: 'Sleep',    chip: 'Withings Sleep', icon: '🌙', color: '#7b74c9', tint: '#eeecfa' },
  weight: { label: 'Weight',   chip: 'Withings Scale', icon: '⚖️', color: '#5fa06a', tint: '#e9f3ea' },
  cal:    { label: 'Calories', chip: 'My Calorie App', icon: '🔥', color: '#d99a3f', tint: '#faf0dc' },
};

// Running comes from data/garmin-data.js (written by sync_garmin.py).
// Sleep + Weight come from data/withings-data.js (written by sync_withings.py).
// Calories comes from data/calories-data.js (written by sync_calories.py,
// fed by the CalorieSnap PWA via a GitHub gist).
// Data older than 48h counts as stale → "Not synced".
const STALE_MS = 48 * 60 * 60 * 1000;

function fresh(file) {
  if (!file || !file.fetchedAt) return null;
  if (Date.now() - new Date(file.fetchedAt).getTime() > STALE_MS) return null;
  return file;
}

// Garmin can arrive three ways, in priority order: a manual daily log kept
// in localStorage, an in-browser CSV import (also localStorage), or
// data/garmin-data.js (written by sync_garmin.py).
function garminSource() {
  const manual = buildManualRunPayload(lastNDays(7));
  if (manual) return fresh(manual);

  let imported = null;
  try { imported = JSON.parse(localStorage.getItem('garminImport')); } catch {}
  const file = window.GARMIN_DATA;
  const newer = (!imported || (file && new Date(file.fetchedAt) > new Date(imported.fetchedAt)))
    ? file : imported;
  return fresh(newer);
}

async function fetchDashboardData() {
  const withings = fresh(window.WITHINGS_DATA);
  return {
    sources: {
      run: garminSource(),
      sleep:  withings ? withings.sleep : null,
      weight: withings ? withings.weight : null,
      cal:    fresh(window.CALORIES_DATA),
    },
    // Placeholder trend until per-day history accumulates.
    weekScores: {
      process: [72, 78, 75, 81, 79, 86, 83],
      goals:   [58, 60, 57, 62, 61, 65, 63],
    },
  };
}

/* =========================================================================
 * GARMIN CSV IMPORT (Garmin Connect -> Activities -> Export CSV)
 * ========================================================================= */

// Minimal CSV parser handling quoted fields ("2,496") and "" escapes.
function parseCSV(text) {
  const rows = [];
  let row = [], cur = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i + 1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else cur += c;
    } else if (c === '"') inQuotes = true;
    else if (c === ',') { row.push(cur); cur = ''; }
    else if (c === '\n' || c === '\r') {
      if (cur !== '' || row.length) { row.push(cur); rows.push(row); row = []; cur = ''; }
    } else cur += c;
  }
  if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

const csvNum = s => parseFloat(String(s ?? '').replace(/,/g, '')) || 0;
const csvSecs = s => String(s ?? '').split(':').reduce((acc, p) => acc * 60 + (parseFloat(p) || 0), 0);
const fmtPace = sPerKm => `${Math.floor(sPerKm / 60)}:${String(Math.round(sPerKm % 60)).padStart(2, '0')}`;
const dateKey = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

function buildGarminPayload(csvText, lastModified) {
  const rows = parseCSV(csvText);
  const header = rows.shift() || [];
  const col = name => header.indexOf(name);
  const iType = col('Activity Type'), iDate = col('Date'), iDist = col('Distance'),
        iCal = col('Calories'), iTime = col('Time');
  if (iType < 0 || iDate < 0 || iDist < 0) {
    throw new Error("That doesn't look like a Garmin Activities.csv");
  }

  const days = lastNDays(7);
  const kmByDay = Object.fromEntries(days.map(d => [dateKey(d), 0]));
  const todayKey = dateKey(new Date());
  let todayKm = 0, todaySecs = 0, todayKcal = 0;

  for (const r of rows) {
    if (!/running/i.test(r[iType] || '')) continue;
    const key = (r[iDate] || '').slice(0, 10);
    if (!(key in kmByDay)) continue;
    const km = csvNum(r[iDist]);
    kmByDay[key] += km;
    if (key === todayKey) {
      todayKm += km;
      todaySecs += csvSecs(r[iTime]);
      todayKcal += csvNum(r[iCal]);
    }
  }

  const weeklyKm = Object.values(kmByDay).reduce((a, b) => a + b, 0);
  const maxKm = Math.max(...Object.values(kmByDay));

  return {
    fetchedAt: new Date(lastModified || Date.now()).toISOString(),
    value: todayKm > 0 ? todayKm.toFixed(1) : '0',
    unit: 'km today',
    sub: todayKm > 0
      ? `Avg pace ${fmtPace(todaySecs / todayKm)} /km · ${Math.round(todayKcal)} kcal`
      : `No run yet today · ${weeklyKm.toFixed(1)} km this week`,
    score: Math.min(100, Math.round(100 * todayKm / CONFIG.dailyGoalKm)),
    processScore: Math.min(100, Math.round(100 * todayKm / CONFIG.dailyGoalKm)),
    goalScore: Math.min(100, Math.round(100 * todayKm / CONFIG.dailyGoalKm)),
    bars: days.map(d => maxKm ? Math.round(100 * kmByDay[dateKey(d)] / maxKm) : 0),
    days: days.map(d => 'SMTWTFS'[d.getDay()]),
  };
}

async function importGarminFile(file) {
  const link = document.querySelector('.import-link span');
  try {
    const payload = buildGarminPayload(await file.text(), file.lastModified);
    localStorage.setItem('garminImport', JSON.stringify(payload));
    boot(); // re-render with the new data
  } catch (err) {
    if (link) {
      link.parentElement.classList.add('error');
      link.textContent = err.message || 'Import failed';
    }
  }
}

/* =========================================================================
 * MANUAL RUN LOG (typed in each day, stored in localStorage)
 * ========================================================================= */

function lastNDays(n) {
  const today = new Date();
  const days = [];
  for (let i = n - 1; i >= 0; i--) { const d = new Date(today); d.setDate(d.getDate() - i); days.push(d); }
  return days;
}

function readManualRunLog() {
  try { return JSON.parse(localStorage.getItem('garminManualLog')) || {}; }
  catch { return {}; }
}

// Builds the same payload shape as the CSV/file sources, but from whatever
// daily entries the user has typed in. Returns null once no entries exist
// at all, so garminSource() can fall back to CSV import / synced file.
function buildManualRunPayload(days) {
  const log = readManualRunLog();
  const keys = Object.keys(log);
  if (!keys.length) return null;

  const kmByDay = Object.fromEntries(days.map(d => [dateKey(d), 0]));
  const todayKey = dateKey(new Date());
  let todayKm = 0, todaySecs = 0, todayKcal = 0;

  for (const d of days) {
    const key = dateKey(d);
    const entry = log[key];
    if (!entry) continue;
    kmByDay[key] += entry.km;
    if (key === todayKey) {
      todayKm += entry.km;
      todaySecs += entry.secs || 0;
      todayKcal += entry.kcal || 0;
    }
  }

  const weeklyKm = Object.values(kmByDay).reduce((a, b) => a + b, 0);
  const maxKm = Math.max(...Object.values(kmByDay));
  const lastLoggedDate = keys.sort().pop(); // most recent entry, logged or not this week

  return {
    fetchedAt: new Date(`${lastLoggedDate}T23:59:59`).toISOString(),
    value: todayKm > 0 ? todayKm.toFixed(1) : '0',
    unit: 'km today',
    sub: todayKm > 0
      ? `Avg pace ${fmtPace(todaySecs / todayKm)} /km · ${Math.round(todayKcal)} kcal`
      : `No run yet today · ${weeklyKm.toFixed(1)} km this week`,
    score: Math.min(100, Math.round(100 * todayKm / CONFIG.dailyGoalKm)),
    processScore: Math.min(100, Math.round(100 * todayKm / CONFIG.dailyGoalKm)),
    goalScore: Math.min(100, Math.round(100 * todayKm / CONFIG.dailyGoalKm)),
    bars: days.map(d => maxKm ? Math.round(100 * kmByDay[dateKey(d)] / maxKm) : 0),
    days: days.map(d => 'SMTWTFS'[d.getDay()]),
  };
}

function logManualRun({ date, km, time, kcal }) {
  const log = readManualRunLog();
  log[date] = { km, secs: time ? csvSecs(time) : 0, kcal: kcal || 0 };
  localStorage.setItem('garminManualLog', JSON.stringify(log));
  boot(); // re-render with the new entry
}

/* =========================================================================
 * DERIVED VALUES
 * ========================================================================= */

function statusLabel(score) {
  if (score >= 85) return 'Thriving';
  if (score >= 70) return 'On track';
  if (score >= 55) return 'Building';
  return 'Needs care';
}

// Older data files may only carry a single `score` — fall back to it.
const processOf = s => s.processScore ?? s.score;
const goalOf = s => s.goalScore ?? s.score;

// Mirrors the weighting scheme from the old health-dashboard's daily score
// (public/app.js compositeScore): missing sources drop out and the rest
// re-normalize, so a source that hasn't synced never drags the score down.
const PROCESS_WEIGHTS = { sleep: 0.3, cal: 0.3, run: 0.25, weight: 0.15 };

function derive(data) {
  let total = 0, weightSum = 0;
  for (const [key, s] of Object.entries(data.sources)) {
    if (s == null) continue;
    const w = PROCESS_WEIGHTS[key];
    total += processOf(s) * w;
    weightSum += w;
  }
  const process = weightSum ? Math.round(total / weightSum) : 0;

  const active = Object.values(data.sources).filter(s => s != null);
  const goals = active.length
    ? Math.round(active.reduce((sum, s) => sum + goalOf(s), 0) / active.length)
    : 0;
  return {
    process, goals,
    processLabel: statusLabel(process),
    goalsLabel: statusLabel(goals),
    activeCount: active.length,
  };
}

/* =========================================================================
 * RENDERING
 * ========================================================================= */

const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const DAY_LETTERS = ['M','T','W','T','F','S','S'];
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function headerHTML(d) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const hr = now.getHours();
  const tod = hr < 12 ? 'morning' : hr < 18 ? 'afternoon' : 'evening';
  const sub = CONFIG.encouragement
    ? "You're trending up — sleep and calories are carrying the week. A rest day tomorrow would lock it in."
    : 'Your health metrics across Garmin, Withings, and your calorie app.';

  const chips = Object.values(SOURCE_META).map(m => `
    <div class="chip"><span class="dot" style="background:${m.color}"></span><span>${esc(m.chip)}</span></div>
  `).join('');

  const ringBlock = (score, label, color) => {
    const r = 62, circ = 2 * Math.PI * r;
    return `
    <div class="ring-block">
      <div class="ring-wrap small">
        <svg width="118" height="118" viewBox="0 0 148 148">
          <circle cx="74" cy="74" r="${r}" fill="none" stroke="var(--track)" stroke-width="13"></circle>
          <circle class="progress" cx="74" cy="74" r="${r}" fill="none" stroke="${color}"
            stroke-width="13" stroke-linecap="round"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}" data-target="${circ * (1 - score / 100)}"></circle>
        </svg>
        <div class="ring-center">
          <div class="ring-num small">${score}</div>
        </div>
      </div>
      <div class="ring-under">${label}</div>
    </div>`;
  };

  return `
  <div class="header fade-up">
    <div class="greeting">
      <div class="eyebrow">${esc(dateStr)}</div>
      <h1>Good ${tod}, ${esc(CONFIG.userName)}.</h1>
      <p class="sub">${esc(sub)}</p>
      <div class="chips">${chips}</div>
    </div>
    <div class="score-card">
      ${ringBlock(d.process, 'Process', CONFIG.accent)}
      ${ringBlock(d.goals, 'Goals', '#b08968')}
      <div class="score-text">
        <div class="eyebrow">Vitality</div>
        <div class="score-row"><span class="score-tag">Process</span><span class="status-word sm">${esc(d.processLabel)}</span></div>
        <div class="score-row"><span class="score-tag">Goals</span><span class="status-word sm">${esc(d.goalsLabel)}</span></div>
        ${d.activeCount < 4 ? `<div class="card-caption" style="margin-top:10px">Based on ${d.activeCount} of 4 sources</div>` : ''}
      </div>
    </div>
  </div>`;
}

function metricCardHTML(key, s) {
  const m = SOURCE_META[key];
  const synced = s != null;

  const barsData = synced ? s.bars : [0,0,0,0,0,0,0];
  const dayLetters = (synced && s.days) || DAY_LETTERS;
  const bars = barsData.map((v, i) => `
    <div class="bar-col">
      <div class="bar" style="background:${i === 6 ? m.color : m.color + '55'};height:0%" data-target="${v}"></div>
      <span class="bar-day">${dayLetters[i]}</span>
    </div>
  `).join('');

  const logRun = key === 'run' ? `
    <div class="log-run">
      <button class="log-run-btn" type="button">+ Log a run</button>
      <form class="log-run-form" hidden>
        <input class="lr-date" type="date" value="${dateKey(new Date())}" required>
        <input class="lr-km" type="number" step="0.01" min="0" placeholder="km" required>
        <input class="lr-time" type="text" placeholder="mm:ss">
        <input class="lr-kcal" type="number" min="0" placeholder="kcal">
        <button type="submit">Save</button>
      </form>
    </div>
    <label class="import-link"><span>or import Activities.csv</span>
      <input type="file" accept=".csv,text/csv" hidden>
    </label>` : '';

  return `
  <div class="card metric-card fade-up" data-key="${key}">
    <div class="metric-top">
      <div class="metric-id">
        <span class="icon-tile" style="background:${m.tint}">${m.icon}</span>
        <span class="metric-label">${esc(m.label)}</span>
      </div>
      ${synced ? `<div class="score-pill" style="color:${m.color};background:${m.tint}" title="Process ${processOf(s)} · Goals ${goalOf(s)}"><span>${processOf(s)} · ${goalOf(s)}</span></div>` : ''}
    </div>
    <div class="hero">
      <span class="value">${synced ? esc(s.value) : '—'}</span>
      ${synced && s.unit ? `<span class="unit">${esc(s.unit)}</span>` : ''}
    </div>
    <div class="metric-sub ${synced ? '' : 'stale'}">${synced ? esc(s.sub) : 'Not synced'}</div>
    <div class="bars">${bars}</div>
    ${logRun}
  </div>`;
}

function trendChartHTML(weekScores) {
  const xFor = i => 34 + i * ((632 - 34) / 6);
  const yFor = v => 184 - ((v - 40) / 60) * 158;

  const grid = [40, 60, 80, 100].map(v => `
    <line x1="34" x2="632" y1="${yFor(v)}" y2="${yFor(v)}" stroke="var(--track)" stroke-width="1.5"></line>
    <text x="10" y="${yFor(v)}" dy="4" font-size="11" font-weight="800" fill="var(--faintest)">${v}</text>
  `).join('');

  const pts = weekScores.map((v, i) => `${xFor(i)},${yFor(v)}`).join(' ');
  const areaPath = `M ${xFor(0)},184 L ${weekScores.map((v, i) => `${xFor(i)},${yFor(v)}`).join(' L ')} L ${xFor(6)},184 Z`;
  const dots = weekScores.map((v, i) => `
    <circle cx="${xFor(i)}" cy="${yFor(v)}" r="4.5" fill="var(--surface)" stroke="${CONFIG.accent}" stroke-width="3"></circle>
    <text x="${xFor(i)}" y="204" text-anchor="middle" font-size="11" font-weight="800" fill="var(--faint)">${DAY_NAMES[i]}</text>
  `).join('');

  return `
  <div class="card trend-card fade-up">
    <div class="trend-head">
      <div class="card-title">Vitality this week</div>
      <div class="card-caption">7-day overall score</div>
    </div>
    <svg viewBox="0 0 660 210">
      <defs>
        <linearGradient id="hd-area" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${CONFIG.accent}" stop-opacity="0.28"></stop>
          <stop offset="100%" stop-color="${CONFIG.accent}" stop-opacity="0"></stop>
        </linearGradient>
      </defs>
      ${grid}
      <path d="${areaPath}" fill="url(#hd-area)"></path>
      <polyline points="${pts}" fill="none" stroke="${CONFIG.accent}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
      ${dots}
    </svg>
  </div>`;
}

function contribHTML(sources) {
  const rows = Object.entries(sources)
    .filter(([, s]) => s != null)
    .sort((a, b) => processOf(b[1]) - processOf(a[1]))
    .map(([key, s]) => {
      const m = SOURCE_META[key];
      return `
      <div>
        <div class="contrib-line">
          <span class="label">${esc(m.label)}</span>
          <span class="num" style="color:${m.color}">${processOf(s)} · ${goalOf(s)}</span>
        </div>
        <div class="rail thin"><div class="fill" style="background:${m.color};width:0%" data-target="${processOf(s)}"></div></div>
        <div class="rail thin second"><div class="fill" style="background:${m.color}77;width:0%" data-target="${goalOf(s)}"></div></div>
      </div>`;
    }).join('');

  return `
  <div class="card contrib-card fade-up">
    <div class="card-title">What's driving your scores</div>
    <div class="card-caption">Per source: process (solid) · goals (light)</div>
    <div class="contrib-rows">${rows}</div>
  </div>`;
}

function skeletonHTML() {
  const card = extra => `
    <div class="card metric-card skeleton" style="gap:14px">
      <div class="sk" style="height:32px;width:60%"></div>
      <div class="sk" style="height:34px;width:45%"></div>
      <div class="sk" style="height:13px;width:80%;margin-bottom:auto"></div>
      <div class="sk" style="height:52px;margin-top:18px"></div>
      ${extra || ''}
    </div>`;
  return `
  <div class="header skeleton">
    <div class="greeting" style="flex:1">
      <div class="sk" style="height:13px;width:180px;margin-bottom:14px"></div>
      <div class="sk" style="height:44px;width:min(420px,90%);margin-bottom:16px"></div>
      <div class="sk" style="height:17px;width:min(360px,80%)"></div>
    </div>
    <div class="card" style="width:340px;height:204px" ></div>
  </div>
  <div class="metrics">${card()}${card()}${card()}${card()}</div>
  <div class="trends">
    <div class="card trend-card skeleton"><div class="sk" style="height:210px"></div></div>
    <div class="card contrib-card skeleton"><div class="sk" style="height:210px"></div></div>
  </div>`;
}

/* =========================================================================
 * BOOT
 * ========================================================================= */

// Import events survive re-renders via delegation on #app: file picker on the
// Running card's link, plus drag-and-drop of the CSV onto the Running card.
function wireGarminImport(app) {
  app.addEventListener('change', e => {
    if (e.target.matches('.import-link input') && e.target.files[0]) {
      importGarminFile(e.target.files[0]);
    }
  });
  const runCard = e => e.target.closest?.('.metric-card[data-key="run"]');
  app.addEventListener('dragover', e => {
    const card = runCard(e);
    if (card) { e.preventDefault(); card.classList.add('drop-target'); }
  });
  app.addEventListener('dragleave', e => runCard(e)?.classList.remove('drop-target'));
  app.addEventListener('drop', e => {
    const card = runCard(e);
    if (!card) return;
    e.preventDefault();
    card.classList.remove('drop-target');
    const file = e.dataTransfer.files?.[0];
    if (file) importGarminFile(file);
  });
}

// Manual run-log form: click toggles it open, submit saves the entry and
// re-renders. Delegated on #app so it survives boot()'s re-render.
function wireManualRunLog(app) {
  app.addEventListener('click', e => {
    if (!e.target.matches('.log-run-btn')) return;
    const form = e.target.nextElementSibling;
    form.hidden = !form.hidden;
    if (!form.hidden) form.querySelector('.lr-km').focus();
  });
  app.addEventListener('submit', e => {
    if (!e.target.matches('.log-run-form')) return;
    e.preventDefault();
    const form = e.target;
    logManualRun({
      date: form.querySelector('.lr-date').value,
      km: parseFloat(form.querySelector('.lr-km').value) || 0,
      time: form.querySelector('.lr-time').value.trim(),
      kcal: parseFloat(form.querySelector('.lr-kcal').value) || 0,
    });
  });
}

function animateIn(root) {
  requestAnimationFrame(() => requestAnimationFrame(() => {
    root.querySelectorAll('.progress[data-target]').forEach(el => { el.style.strokeDashoffset = el.dataset.target; });
    root.querySelectorAll('.bar[data-target]').forEach(el => { el.style.height = el.dataset.target + '%'; });
    root.querySelectorAll('.fill[data-target]').forEach(el => { el.style.width = el.dataset.target + '%'; });
  }));
}

async function boot() {
  const app = document.getElementById('app');
  document.documentElement.style.setProperty('--accent', CONFIG.accent);
  app.innerHTML = skeletonHTML();

  const data = await fetchDashboardData();
  const d = derive(data);

  app.innerHTML =
    headerHTML(d) +
    `<div class="metrics">${Object.keys(SOURCE_META).map(k => metricCardHTML(k, data.sources[k])).join('')}</div>` +
    `<div class="trends">${trendChartHTML(data.weekScores.process)}${contribHTML(data.sources)}</div>`;

  animateIn(app);
}

wireGarminImport(document.getElementById('app'));
wireManualRunLog(document.getElementById('app'));
boot();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {
      /* offline launch is a progressive enhancement; ignore failures */
    });
  });
}
</script>
</body>
</html>
